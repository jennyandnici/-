<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>매일메일 - 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0eeea;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      display: flex;
      align-items: stretch;
      width: 100%;
      max-width: 640px;
      min-height: 480px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 40px rgba(0,0,0,0.10);
      border: 1px solid rgba(0,0,0,0.07);
    }

    .panel-left {
      width: 220px;
      flex-shrink: 0;
      background: #0f1117;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .logo {
      font-family: 'Noto Serif KR', serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 5px;
    }

    .tagline {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      line-height: 1.6;
      margin-bottom: auto;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 2.5rem;
    }

    .feat {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .feat-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .feat-body { display: flex; flex-direction: column; gap: 2px; }
    .feat-title { font-size: 12px; color: rgba(255,255,255,0.85); font-weight: 500; }
    .feat-desc  { font-size: 11px; color: rgba(255,255,255,0.4); line-height: 1.4; }

    .panel-right {
      flex: 1;
      background: #ffffff;
      padding: 2.25rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-heading { font-size: 18px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
    .form-sub     { font-size: 13px; color: #888; margin-bottom: 1.75rem; }

    .field { margin-bottom: 12px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      margin-bottom: 5px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid #e0e0dd;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #1a1a1a;
      background: #f8f7f5;
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #378add;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(55,138,221,0.10);
    }

    input::placeholder { color: #bbb; }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.25rem;
    }

    .forgot {
      font-size: 12px;
      color: #378add;
      text-decoration: none;
    }

    .btn-login {
      width: 100%;
      padding: 10px;
      background: #0f1117;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: opacity 0.15s;
      margin-bottom: 12px;
    }

    .btn-login:hover { opacity: 0.82; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .divider-line { flex: 1; height: 1px; background: #e8e8e5; }
    .divider-text { font-size: 11px; color: #aaa; }

    .btn-google {
      width: 100%;
      padding: 9px;
      background: #f8f7f5;
      border: 1px solid #e0e0dd;
      border-radius: 8px;
      font-size: 13px;
      color: #1a1a1a;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
      margin-bottom: 1.5rem;
    }

    .btn-google:hover { background: #f0eeea; }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .security {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .security-text { font-size: 11px; color: #bbb; }

    .signup-text { font-size: 12px; color: #888; }
    .signup-text a { color: #378add; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">

    <div class="panel-left">
      <p class="logo">매일메일</p>
      <p class="tagline">AI 기반 스마트<br>이메일 센티널</p>

      <div class="features">
        <div class="feat">
          <div class="feat-icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <div class="feat-body">
            <span class="feat-title">보안 강화 모드</span>
            <span class="feat-desc">256-bit 암호화 적용</span>
          </div>
        </div>

        <div class="feat">
          <div class="feat-icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.07 4.93A10 10 0 0 0 2 12h2"/>
              <path d="M21.17 8C21.71 9.28 22 10.61 22 12a10 10 0 0 1-5.93 9.07"/>
            </svg>
          </div>
          <div class="feat-body">
            <span class="feat-title">AI 필터링</span>
            <span class="feat-desc">스팸·피싱 자동 차단</span>
          </div>
        </div>

        <div class="feat">
          <div class="feat-icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18"/>
              <path d="M9 21V9"/>
            </svg>
          </div>
          <div class="feat-body">
            <span class="feat-title">스마트 분류</span>
            <span class="feat-desc">중요 메일 자동 정리</span>
          </div>
        </div>
      </div>
    </div>

    <div class="panel-right">
      <p class="form-heading">로그인</p>
      <p class="form-sub">계정에 접속하세요</p>

      <div class="field">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="example@company.com" />
      </div>

      <div class="field">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <div class="forgot-row">
        <a href="#" class="forgot">비밀번호를 잊으셨나요?</a>
      </div>

      <button class="btn-login" onclick="window.location.href='main.html'">로그인</button>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">또는</span>
        <div class="divider-line"></div>
      </div>

      <button class="btn-google">
        <svg width="14" height="14" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google로 계속하기
      </button>

      <div class="footer-row">
        <div class="security">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span class="security-text">256-bit 암호화</span>
        </div>
        <p class="signup-text">계정이 없으신가요? <a href="#">회원가입</a></p>
      </div>
    </div>

  </div>
</body>
</html>
