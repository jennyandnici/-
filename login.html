<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>매일메일 - 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e5e3;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #e6f1fb;
      color: #185fa5;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #185fa5;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e0e0de;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #378add;
    }

    input::placeholder {
      color: #bbb;
    }

    .forgot {
      text-align: right;
      margin-bottom: 1rem;
    }

    .forgot a {
      font-size: 12px;
      color: #888;
      text-decoration: none;
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s;
    }

    .btn-login:hover { opacity: 0.85; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.25rem 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #e5e5e3;
    }

    .divider-text {
      font-size: 12px;
      color: #aaa;
    }

    .btn-google {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }

    .btn-google:hover { background: #f5f5f3; }

    .security {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e5e3;
    }

    .security-text {
      font-size: 11px;
      color: #aaa;
    }

    .footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 13px;
      color: #888;
    }

    .footer a {
      color: #185fa5;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="logo">매일메일</p>
    <p class="tagline">AI 기반 스마트 이메일 센티널</p>

    <div class="badge">
      <span class="badge-dot"></span>
      보안 강화 모드 활성화
    </div>

    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" placeholder="example@company.com" />
    </div>

    <div class="field">
      <label for="password">비밀번호</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <div class="forgot">
      <a href="#">비밀번호를 잊으셨나요?</a>
    </div>

    <button class="btn-login">로그인</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">또는</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-google">
      <svg width="16" height="16" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 계속하기
    </button>

    <div class="security">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span class="security-text">256-bit 암호화로 안전하게 보호됩니다</span>
    </div>

    <div class="footer">
      계정이 없으신가요? <a href="#">회원가입</a>
    </div>
  </div>
</body>
</html>
